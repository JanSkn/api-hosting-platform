# see https://docs.github.com/de/actions/tutorials/build-and-test-code/java-with-maven
name: Backend CI checks

on:
  workflow_call:
    inputs:
      module-name:
        required: true
        type: string

jobs:
  ci-checks:
    name: CI Checks – ${{ inputs.module-name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-java-maven
      - uses: ./.github/actions/setup-just

      - name: Local install of shared modules
        run: just lambda install

      - name: Static Code Analysis
        run: |
          just ${{ inputs.module-name }} lint
          just ${{ inputs.module-name }} code-analysis

      - name: Run Unit Tests
        run: just ${{ inputs.module-name }} unit-test

      - name: Create Build Artifact
        run: just ${{ inputs.module-name }} build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apiforge-${{ inputs.module-name }}-jar
          path: ${{ inputs.module-name }}/target/*.jar
          retention-days: 1

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ inputs.module-name }}
          path: ${{ inputs.module-name }}/target/surefire-reports/

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ inputs.module-name }}
          path: ${{ inputs.module-name }}/target/site/jacoco/