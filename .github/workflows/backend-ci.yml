# see https://docs.github.com/de/actions/tutorials/build-and-test-code/java-with-maven
name: Backend CI checks

on:
  workflow_call:
    inputs:
      module-name:
        required: true
        type: string

jobs:
  static-code-analysis:
    name: Static Code Analysis – ${{ inputs.module-name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-just

      - name: Spotless Check
        run: just ${{ inputs.module-name }} lint

      - name: Code Analysis (PMD & CPD)
        run: just ${{ inputs.module-name }} code-analysis

  build:
    name: Build  – ${{ inputs.module-name }}
    runs-on: ubuntu-latest
    needs: static-code-analysis
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-java-maven
      - uses: ./.github/actions/setup-just

      - name: Compile & Package
        run: just ${{ inputs.module-name }} build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apiforge-${{ inputs.module-name }}-jar
          path: ${{ inputs.module-name }}/target/*.jar
          retention-days: 1

  test:
    name: Unit Tests  – ${{ inputs.module-name }}
    runs-on: ubuntu-latest
    needs: static-code-analysis
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-java-maven
      - uses: ./.github/actions/setup-just

      - name: Run Unit Tests
        run: just ${{ inputs.module-name }} unit-test

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ inputs.module-name }}
          path: ${{ inputs.module-name }}/target/surefire-reports/

      - name: Upload Coverage Ceport
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ inputs.module-name }}
          path: ${{ inputs.module-name }}/target/site/jacoco/