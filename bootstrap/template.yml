AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: IAM setup for APIForge. Must be run per environment (staging, prod) before deploying the main stack. 

Parameters:
  GitHubRepo:
    Type: String
    Default: "janskn/api-hosting-platform"

Resources:
  # deployments only allowed from GitHub Actions
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList: [sts.amazonaws.com]
      ThumbprintList: ["a031c46782e6e6c662c2c87c76da9aa62ccabd8e", "6938fd4d98bab03faadb97b34396831e3780aea1"]

  GitHubDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: GitHubActionsDeploymentRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOIDCProvider
            Action: "sts:AssumeRoleWithWebIdentity"
            Condition:
              StringLike:
                "token.actions.githubusercontent.com:sub": !Sub "repo:${GitHubRepo}:*"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/PowerUserAccess

  # not required to run the main stack, but used for checking logs etc. instead of personal account + role or root account
  BootstrapAdminUser:
    Type: "AWS::IAM::User"
    Properties:
      UserName: bootstrap-admin

  BootstrapAdminRole:
    Type: "AWS::IAM::Role"
    Properties:
      RoleName: BootstrapAdminRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: "sts:AssumeRole"
            Condition:
              # only allow assuming the role if the user is the bootstrap admin and MFA is present
              ArnEquals:
                "aws:PrincipalArn": !GetAtt BootstrapUser.Arn
              Bool:
                "aws:MultiFactorAuthPresent": "true"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess