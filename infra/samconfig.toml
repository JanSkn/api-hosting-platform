version = 0.1

# single source of truth: stack name, region and env variables set here and read from
# deployment scripts and Lambda Java code

[local.deploy.parameters]
stack_name = "apiforge-local"
region = "eu-central-1"
resolve_s3 = true # auto-created S3 bucket for the template
capabilities = ["CAPABILITY_IAM", "CAPABILITY_NAMED_IAM"]
parameter_overrides = [
    "Environment=local", 
    "AwsRegion=eu-central-1",
    "LambdaMemory=512",
    "MaxDeploymentsPerUser=15"
]

[staging.deploy.parameters]
stack_name = "apiforge-stg"
region = "eu-central-1"
parameter_overrides = [
    "Environment=stg", 
    "AwsRegion=eu-central-1", 
    "LambdaMemory=512",
    "MaxDeploymentsPerUser=5"
]

[prod.deploy.parameters]
stack_name = "apiforge-prod"
region = "eu-central-1"
parameter_overrides = [
    "Environment=prod", 
    "AwsRegion=eu-central-1", 
    "LambdaMemory=512",
    "MaxDeploymentsPerUser=5"
]